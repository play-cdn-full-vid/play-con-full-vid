<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 3 second ka delay rakha hai -->
    <meta http-equiv="refresh" content="3; url=https://alarmpenguinmelt.com/rq9idam3?key=a6c106f7c5cce0e4692802a3904ebd37">
    <title>Redirecting...</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 28px; margin-bottom: 10px; }
        p { color: #666; max-width: 80%; }
        a { color: #8e44ad; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Redirecting...</h1>
    <p>Please wait while we redirect you to the destination. If you are not redirected automatically, <a href="https://alarmpenguinmelt.com/rq9idam3?key=a6c106f7c5cce0e4692802a3904ebd37">click here</a>.</p>
    <div class="loader"></div>

    <script type="text/javascript">
        setTimeout(function() {
            window.location.href = "https://alarmpenguinmelt.com/rq9idam3?key=a6c106f7c5cce0e4692802a3904ebd37";
        }, 3000); // 3000ms = 3 seconds
    </script>
</body>
</html>
